<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ワクワクマップ</title>
<style>
:root {
  --primary: #FF6B35;
  --primary-light: #FFF0E8;
  --secondary: #4ECDC4;
  --accent: #FFE66D;
  --bg: #FAFAFA;
  --text: #2D3436;
  --text-light: #636E72;
  --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: #F0F0F0;
  color: var(--text);
  display: flex;
  justify-content: center;
  min-height: 100dvh;
}

.app {
  width: 100%;
  max-width: 430px;
  background: var(--bg);
  min-height: 100dvh;
  position: relative;
  overflow-x: hidden;
}

.screen {
  display: none;
  min-height: 100dvh;
  padding: 0 0 100px;
}
.screen.active { display: block; }

/* ===== ヘッダー ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #FFF;
  padding: 12px 16px 8px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.header-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--primary);
}
.user-switcher {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--primary-light);
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  border: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
}
.user-switcher svg { width: 14px; height: 14px; }

.mini-chart-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0 4px;
}
.mini-chart { width: 48px; height: 48px; }
.mini-chart-info {
  font-size: 12px;
  color: var(--text-light);
  line-height: 1.5;
}
.mini-chart-info strong {
  color: var(--text);
  font-size: 14px;
}

/* ===== 初回ワンライナー ===== */
.onboarding-hint {
  margin: 0 16px 8px;
  padding: 10px 14px;
  background: linear-gradient(135deg, #FFF8E0, #FFF0E8);
  border-radius: 12px;
  font-size: 13px;
  color: var(--text);
  text-align: center;
  font-weight: 600;
  animation: slideDown 0.4s ease;
}

/* ===== ブース一覧 ===== */
.booth-list { padding: 16px; }
.section-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-light);
  margin-bottom: 12px;
  padding-left: 4px;
}

.booth-card {
  background: #FFF;
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--card-shadow);
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.15s;
  position: relative;
  overflow: hidden;
}
.booth-card:active { transform: scale(0.98); }
.booth-card.recorded { border-left: 4px solid var(--secondary); }
.booth-card.recorded::after {
  content: '✓';
  position: absolute;
  top: 8px;
  right: 12px;
  color: var(--secondary);
  font-weight: 700;
  font-size: 16px;
}

.booth-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.booth-info { flex: 1; }
.booth-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.booth-company { font-size: 12px; color: var(--text-light); }
.booth-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.booth-tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: #F0F0F0;
  color: var(--text-light);
}

/* ===== リマインドバナー ===== */
.remind-banner {
  display: none;
  margin: 0 16px 12px;
  padding: 12px 16px;
  background: linear-gradient(135deg, #FFF8E0, #FFF0E8);
  border-radius: 12px;
  font-size: 13px;
  color: var(--text);
  align-items: center;
  gap: 8px;
  animation: slideDown 0.3s ease;
}
.remind-banner.show { display: flex; }
.remind-banner-icon { font-size: 20px; }
.remind-banner-close {
  margin-left: auto;
  background: none;
  border: none;
  font-size: 18px;
  color: var(--text-light);
  cursor: pointer;
  padding: 0 4px;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== Fixed下部ふりかえりボタン ===== */
.fixed-review-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: #FFF;
  padding: 12px 16px;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
  z-index: 100;
}
.review-btn {
  width: 100%;
  padding: 16px;
  background: var(--primary);
  color: #FFF;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s;
}
.review-btn:active { transform: scale(0.97); }
.review-btn:disabled { opacity: 0.35; cursor: default; }

/* ===== 記録画面 ===== */
#recordScreen {
  background: linear-gradient(180deg, #FFF 0%, #F8F8F8 100%);
}
.record-header {
  padding: 20px 16px 16px;
  text-align: center;
}
.record-booth-name { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
.record-company { font-size: 13px; color: var(--text-light); }
.record-step-indicator {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 20px 0;
}
.step-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #DDD;
  transition: background 0.2s, transform 0.2s;
}
.step-dot.active { background: var(--primary); transform: scale(1.3); }
.step-dot.done { background: var(--secondary); }

.question-area {
  padding: 0 24px;
  text-align: center;
}
.question-text {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 24px;
  line-height: 1.5;
}

/* 横並び絵文字カード */
.choices {
  display: flex;
  flex-direction: row;
  gap: 10px;
  justify-content: center;
  max-width: 340px;
  margin: 0 auto;
}
.choice-btn {
  flex: 1;
  padding: 16px 8px 12px;
  border: 2px solid #E8E8E8;
  border-radius: 16px;
  background: #FFF;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.choice-btn:active { transform: scale(0.94); }
.choice-btn.selected {
  border-color: var(--primary);
  background: var(--primary-light);
  transform: scale(1.05);
}
.choice-emoji { font-size: 48px; line-height: 1; }
.choice-label { font-size: 10px; font-weight: 600; color: var(--text-light); line-height: 1.3; }
.choice-btn.selected .choice-label { color: var(--primary); }

.record-chart-preview {
  display: flex;
  justify-content: center;
  margin: 32px 0 16px;
}
.record-chart-preview svg { width: 160px; height: 160px; }

.record-done-msg {
  text-align: center;
  padding: 32px 24px;
  animation: fadeUp 0.4s ease;
}
.record-done-msg h2 { font-size: 22px; margin-bottom: 8px; }
.record-done-msg p { font-size: 14px; color: var(--text-light); line-height: 1.6; }
.record-done-actions {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}
.record-next-btn {
  padding: 14px 32px;
  background: var(--primary);
  color: #FFF;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s;
}
.record-next-btn:active { transform: scale(0.97); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== 名前入力モーダル ===== */
.name-modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 300;
  justify-content: center;
  align-items: center;
}
.name-modal-overlay.show { display: flex; }
.name-modal {
  width: 90%;
  max-width: 320px;
  background: #FFF;
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  animation: fadeUp 0.3s ease;
}
.name-modal h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.name-modal p { font-size: 13px; color: var(--text-light); margin-bottom: 20px; line-height: 1.5; }
.name-modal input {
  width: 100%;
  padding: 14px 20px;
  border: 2px solid #DDD;
  border-radius: 12px;
  font-size: 18px;
  text-align: center;
  outline: none;
  margin-bottom: 14px;
  transition: border-color 0.2s;
}
.name-modal input:focus { border-color: var(--primary); }
.name-modal-btn {
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: #FFF;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}
.name-modal-btn:disabled { opacity: 0.4; cursor: default; }

/* ===== ふりかえり画面 ===== */
#reviewScreen {
  background: linear-gradient(180deg, #FFF0E8 0%, #E8FFF8 50%, #FFF8E0 100%);
  padding-bottom: 40px;
}
.review-header {
  text-align: center;
  padding: 32px 24px 16px;
}
.review-header h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.review-header p { font-size: 13px; color: var(--text-light); }

.review-chart-area {
  display: flex;
  justify-content: center;
  padding: 16px 0;
}
.review-chart-area svg { width: 260px; height: 260px; }

.type-card {
  margin: 0 16px 16px;
  background: #FFF;
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: var(--card-shadow);
  text-align: center;
}
.type-label { font-size: 12px; color: var(--text-light); margin-bottom: 4px; }
.type-name { font-size: 26px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
.type-desc { font-size: 14px; color: var(--text-light); line-height: 1.6; }

/* 関心軸バッジ */
.interest-badge {
  display: inline-block;
  margin-top: 12px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
}

.recommend-section { padding: 0 16px 16px; }
.recommend-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 12px;
  padding-left: 4px;
}
.recommend-card {
  background: #FFF;
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--card-shadow);
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.recommend-card .booth-icon { width: 40px; height: 40px; font-size: 20px; border-radius: 10px; flex-shrink: 0; margin-top: 2px; }
.recommend-card-info { flex: 1; }
.recommend-card-name { font-size: 14px; font-weight: 700; }
.recommend-card-reason { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.recommend-card-perspective {
  display: inline-block;
  margin-top: 6px;
  padding: 4px 10px;
  border-radius: 8px;
  background: #F0F8FF;
  font-size: 11px;
  font-weight: 600;
  color: #3B82F6;
}

.action-section { padding: 0 16px 16px; }
.action-card {
  background: #FFF;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--card-shadow);
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.action-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
  flex-shrink: 0;
}
.action-text { font-size: 14px; line-height: 1.6; }

.screenshot-hint {
  text-align: center;
  padding: 8px 16px 16px;
  font-size: 12px;
  color: var(--text-light);
}

/* ===== ユーザー切替モーダル ===== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  justify-content: center;
  align-items: flex-end;
}
.modal-overlay.show { display: flex; }
.modal-sheet {
  width: 100%;
  max-width: 430px;
  background: #FFF;
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 40px;
  animation: sheetUp 0.3s ease;
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; text-align: center; }
.user-list { list-style: none; }
.user-item {
  padding: 14px 16px;
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.15s;
}
.user-item:hover { background: #F8F8F8; }
.user-item.current { background: var(--primary-light); font-weight: 700; }
.user-item-name { font-size: 16px; }
.user-item-count { font-size: 12px; color: var(--text-light); }

.add-user-row { display: flex; gap: 8px; margin-top: 12px; }
.add-user-row input {
  flex: 1;
  padding: 12px 16px;
  border: 2px solid #E8E8E8;
  border-radius: 10px;
  font-size: 15px;
  outline: none;
}
.add-user-row input:focus { border-color: var(--primary); }
.add-user-btn {
  padding: 12px 20px;
  background: var(--primary);
  color: #FFF;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  font-size: 14px;
  color: var(--primary);
  font-weight: 600;
  cursor: pointer;
  padding: 8px 0;
  margin: 12px 16px 0;
}
.back-btn svg { width: 18px; height: 18px; }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ===== ブース一覧画面 ===== -->
  <div class="screen active" id="listScreen">
    <div class="header">
      <div class="header-top">
        <div class="header-title">ワクワクマップ</div>
        <button class="user-switcher" id="switchUserBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="currentUserLabel">ゲスト</span>
        </button>
      </div>
      <div class="mini-chart-row">
        <svg class="mini-chart" id="miniChart" viewBox="0 0 48 48"></svg>
        <div class="mini-chart-info">
          <strong id="recordCountLabel">0 / 8 体験済み</strong><br>
          <span id="miniChartHint">ブースを体験して記録しよう</span>
        </div>
      </div>
    </div>
    <div class="onboarding-hint" id="onboardingHint">体験を記録すると、きみのワクワクタイプがわかる！</div>
    <div class="remind-banner" id="remindBanner">
      <span class="remind-banner-icon">💡</span>
      <span>さっきの体験、どうだった？<br>記録するともっとマップが育つよ！</span>
      <button class="remind-banner-close" id="remindClose">✕</button>
    </div>
    <div class="booth-list" id="boothList"></div>
    <div class="fixed-review-bar" id="fixedReviewBar">
      <button class="review-btn" id="goReviewBtn" disabled>ふりかえりを見る（あと2つ体験しよう！）</button>
    </div>
  </div>

  <!-- ===== 記録画面 ===== -->
  <div class="screen" id="recordScreen">
    <button class="back-btn" id="recordBackBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      もどる
    </button>
    <div class="record-header">
      <div class="record-booth-name" id="recordBoothName"></div>
      <div class="record-company" id="recordCompany"></div>
    </div>
    <div class="record-step-indicator" id="stepIndicator"></div>
    <div class="question-area" id="questionArea"></div>
    <div class="record-chart-preview" id="recordChartPreview">
      <svg id="recordChart" viewBox="0 0 200 200"></svg>
    </div>
  </div>

  <!-- ===== ふりかえり画面 ===== -->
  <div class="screen" id="reviewScreen">
    <button class="back-btn" id="reviewBackBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      もどる
    </button>
    <div class="review-header">
      <h1 id="reviewUserName"></h1>
      <p>きみのワクワクマップ</p>
    </div>
    <div class="review-chart-area">
      <svg id="reviewChart" viewBox="0 0 260 260"></svg>
    </div>
    <div class="type-card" id="typeCard">
      <div class="type-label">きみのワクワクタイプ</div>
      <div class="type-name" id="typeName"></div>
      <div class="type-desc" id="typeDesc"></div>
      <div class="interest-badge" id="interestBadge"></div>
    </div>
    <div class="recommend-section" id="recommendSection">
      <div class="recommend-title">🗺️ つぎに冒険するならここ！</div>
      <div id="recommendList"></div>
    </div>
    <div class="action-section">
      <div class="recommend-title">🏠 明日からやってみよう</div>
      <div id="actionList"></div>
    </div>
    <div class="screenshot-hint">📸 スクショして記念に残そう！</div>
  </div>

  <!-- ===== 名前入力モーダル ===== -->
  <div class="name-modal-overlay" id="nameModal">
    <div class="name-modal">
      <h2>きみの名前は？</h2>
      <p>記録するために名前を教えてね！<br>あとで変えられるよ</p>
      <input type="text" id="nameModalInput" placeholder="なまえを入れてね" maxlength="10">
      <button class="name-modal-btn" id="nameModalBtn" disabled>きろくをはじめる</button>
    </div>
  </div>

  <!-- ===== ユーザー切替モーダル ===== -->
  <div class="modal-overlay" id="userModal">
    <div class="modal-sheet">
      <div class="modal-title">だれが使う？</div>
      <ul class="user-list" id="userList"></ul>
      <div class="add-user-row">
        <input type="text" id="addUserInput" placeholder="なまえを追加" maxlength="10">
        <button class="add-user-btn" id="addUserBtn">追加</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ===== 定数データ ===== */
const AXES = ['つくる','まもる','とどける','そだてる','しらべる','つたえる'];
const AXIS_COLORS = ['#FF6B35','#4ECDC4','#45B7D1','#96CEB4','#A78BFA','#F472B6'];
const INTEREST_KEYS = ['tool','people','system'];
const INTEREST_LABELS = { tool:'道具・素材', people:'人・チームワーク', system:'しくみ・流れ' };
const INTEREST_COLORS = { tool:'#F59E0B', people:'#EC4899', system:'#3B82F6' };
const INTEREST_BG = { tool:'#FFF7ED', people:'#FDF2F8', system:'#EFF6FF' };

const BOOTHS = [
  { id:1, name:'トラックづくり体験', company:'河内長野運送(株)', icon:'🚚', color:'#FFE0CC', axes:[1,0,0.4,0,0.2,0], category:'ものづくり',
    perspectives:{ tool:'パーツの素材や形のちがいに注目してみよう', people:'チームで協力して組み立てる楽しさを感じよう', system:'トラックが届くまでの流れを想像してみよう' }},
  { id:2, name:'美容師なりきり体験', company:'ヘアサロン Ciel', icon:'💇', color:'#FFE0F0', axes:[0.4,0,0,0,0,1], category:'サービス',
    perspectives:{ tool:'ハサミやブラシなど道具の使い方に注目しよう', people:'お客さんとの会話や気づかいを観察しよう', system:'カット→セットの流れや順番を見てみよう' }},
  { id:3, name:'お花アレンジメント', company:'花工房 はなみずき', icon:'💐', color:'#E8FFE0', axes:[0.8,0,0,0.8,0,0.3], category:'ものづくり',

/* ===== 状態管理 ===== */
function loadState() {

}
function saveState(state) {
  localStorage.setItem('wakumap_v3', JSON.stringify(state));
}
function initState() {
  return { users: [{ name: '', records: {} }], currentUser: 0 };
}
function getCurrentUser(state) {
  return state.users[state.currentUser];
}

/* ===== レーダーチャート描画 ===== */
function drawRadar(svgEl, scores, size, opts = {}) {
  const { showLabels = false, showValues = false, animate = false } = opts;
  const cx = size / 2, cy = size / 2, r = size * 0.35;
  const n = AXES.length;
  let svg = '';

  for (let lv = 1; lv <= 3; lv++) {
    const rr = r * lv / 3;
    const pts = [];
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      pts.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
    }
    svg += `<polygon points="${pts.join(' ')}" fill="none" stroke="#E0E0E0" stroke-width="${lv===3?1.5:0.7}"/>`;
  }

  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    svg += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(angle)}" y2="${cy + r * Math.sin(angle)}" stroke="#E0E0E0" stroke-width="0.7"/>`;
  }

  const dataPts = [];
  for (let i = 0; i < n; i++) {
    const val = Math.min(scores[i] || 0, 1);
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const dr = r * (0.1 + 0.9 * val);
    dataPts.push(`${cx + dr * Math.cos(angle)},${cy + dr * Math.sin(angle)}`);
  }
  const hasData = scores.some(s => s > 0);
  if (hasData) {
    svg += `<polygon points="${dataPts.join(' ')}" fill="rgba(255,107,53,0.15)" stroke="var(--primary)" stroke-width="2" stroke-linejoin="round"${animate ? ' style="animation:fadeUp 0.5s ease"' : ''}/>`;
    for (let i = 0; i < n; i++) {
      if ((scores[i] || 0) > 0) {
        svg += `<circle cx="${dataPts[i].split(',')[0]}" cy="${dataPts[i].split(',')[1]}" r="3.5" fill="var(--primary)"/>`;
      }
    }
  }

  if (showLabels) {
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const lr = r + size * 0.12;
      const lx = cx + lr * Math.cos(angle);
      const ly = cy + lr * Math.sin(angle);
      const val = scores[i] || 0;
      const color = val > 0 ? AXIS_COLORS[i] : '#AAA';
      const fontSize = size > 100 ? 12 : 6;
      svg += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" fill="${color}" font-size="${fontSize}" font-weight="700">${AXES[i]}</text>`;
      if (showValues && val === 0) {
        svg += `<text x="${lx}" y="${ly + fontSize + 2}" text-anchor="middle" fill="#CCC" font-size="${fontSize * 0.7}">未冒険</text>`;
      }
    }
  }
  svgEl.innerHTML = svg;
}

/* ===== スコア計算 ===== */
function calcScores(user) {
  const scores = [0,0,0,0,0,0];
  const count = Object.keys(user.records).length;
  if (count === 0) return scores;

  for (const boothId in user.records) {
    const booth = BOOTHS.find(b => b.id === parseInt(boothId));
    if (!booth) continue;
    const rec = user.records[boothId];
    let weight = 1;
    if (rec.q1 === 'fun') weight = 1.0;
    else if (rec.q1 === 'wow') weight = 1.2;
    else if (rec.q1 === 'curious') weight = 1.1;

    for (let i = 0; i < 6; i++) {
      scores[i] += booth.axes[i] * weight;
    }
  }
  const max = Math.max(...scores, 0.001);
  return scores.map(s => Math.min(s / max, 1));
}

/* ===== 関心軸の集計 ===== */
function calcDominantInterest(user) {
  const counts = { tool: 0, people: 0, system: 0 };
  for (const boothId in user.records) {
    const rec = user.records[boothId];
    if (rec.q2 && counts.hasOwnProperty(rec.q2)) {
      counts[rec.q2]++;
    }
  }
  let maxKey = 'tool';
  let maxVal = 0;
  for (const key in counts) {
    if (counts[key] > maxVal) { maxVal = counts[key]; maxKey = key; }
  }
  return maxKey;
}

/* ===== 記録画面 ===== */
let currentBooth = null;
let currentStep = 0;
let recordAnswers = {};

function startRecord(booth) {
  currentBooth = booth;
  currentStep = 0;
  recordAnswers = {};
  const user = getCurrentUser(appState);
  if (user.records[booth.id]) {
    recordAnswers = { ...user.records[booth.id] };
  }
  document.getElementById('recordBoothName').textContent = booth.name;
  document.getElementById('recordCompany').textContent = booth.company;
  renderStep();
  showScreen('recordScreen');
}

function renderStep() {
  const indicator = document.getElementById('stepIndicator');
  indicator.innerHTML = '';
  for (let i = 0; i < QUESTIONS.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (i === currentStep ? ' active' : (i < currentStep ? ' done' : ''));
    indicator.appendChild(dot);
  }

  const area = document.getElementById('questionArea');
  const chartPreview = document.getElementById('recordChartPreview');

  if (currentStep >= QUESTIONS.length) {
    area.innerHTML = '';
    const doneDiv = document.createElement('div');
    doneDiv.className = 'record-done-msg';
    doneDiv.innerHTML = `
      <h2>きろくできた！ 🎉</h2>
      <p>マップが少し育ったよ。<br>ほかのブースも体験してみよう！</p>
      <div class="record-done-actions">
        <button class="record-next-btn" id="recordNextBtn">つぎのブースへ →</button>
      </div>`;
    area.appendChild(doneDiv);
    document.getElementById('recordNextBtn').addEventListener('click', () => {
      showScreen('listScreen');
      renderList();
    });

    const scores = calcScores(getCurrentUser(appState));
    chartPreview.style.display = 'flex';
    drawRadar(document.getElementById('recordChart'), scores, 200, { showLabels: true, animate: true });
    return;
  }

  chartPreview.style.display = 'none';
  const q = QUESTIONS[currentStep];
  area.innerHTML = `<div class="question-text">${q.text}</div>`;
  const choicesDiv = document.createElement('div');
  choicesDiv.className = 'choices';
  q.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    const prevAnswer = recordAnswers[`q${currentStep + 1}`];
    if (prevAnswer === c.value) btn.classList.add('selected');
    btn.innerHTML = `<span class="choice-emoji">${c.emoji}</span><span class="choice-label">${c.label}</span>`;
    btn.addEventListener('click', () => {
      recordAnswers[`q${currentStep + 1}`] = c.value;
      const user = getCurrentUser(appState);
      user.records[currentBooth.id] = { ...recordAnswers };
      saveState(appState);
      currentStep++;
      setTimeout(renderStep, 200);
    });
    choicesDiv.appendChild(btn);
  });
  area.appendChild(choicesDiv);
}

document.getElementById('recordBackBtn').addEventListener('click', () => {
  if (currentStep > 0) { currentStep--; renderStep(); }
  else { showScreen('listScreen'); renderList(); }
});

/* ===== ふりかえり画面 ===== */
function renderReview() {
  const user = getCurrentUser(appState);
  const scores = calcScores(user);
  const displayName = user.name || 'ゲスト';
  const dominantInterest = calcDominantInterest(user);

  document.getElementById('reviewUserName').textContent = `${displayName}のワクワクマップ`;
  drawRadar(document.getElementById('reviewChart'), scores, 260, { showLabels: true, showValues: true, animate: true });

  // タイプ判定
  let maxIdx = 0;
  for (let i = 1; i < scores.length; i++) {
    if (scores[i] > scores[maxIdx]) maxIdx = i;
  }
  const axisName = AXES[maxIdx];
  const type = TYPES[axisName];
  document.getElementById('typeName').textContent = `${axisName}タイプ — ${type.name}`;
  document.getElementById('typeDesc').textContent = type.desc;

  // 関心軸バッジ
  const badge = document.getElementById('interestBadge');
  badge.textContent = `👀 きみが気になるのは「${INTEREST_LABELS[dominantInterest]}」`;
  badge.style.background = INTEREST_BG[dominantInterest];
  badge.style.color = INTEREST_COLORS[dominantInterest];

  // おすすめブース（未体験・親和度順、関心軸の観点つき）
  const unvisited = BOOTHS.filter(b => !user.records[b.id]);
  const ranked = unvisited.map(b => {
    let affinity = 0;
    for (let i = 0; i < 6; i++) affinity += b.axes[i] * (1 - (scores[i] || 0));
    return { booth: b, affinity };
  }).sort((a, b) => b.affinity - a.affinity);

  const recommendList = document.getElementById('recommendList');
  const recommendSection = document.getElementById('recommendSection');
  if (ranked.length === 0) {
    recommendSection.style.display = 'none';
  } else {
    recommendSection.style.display = 'block';
    recommendList.innerHTML = '';
    ranked.slice(0, 2).forEach(r => {
      const perspective = r.booth.perspectives[dominantInterest];
      const card = document.createElement('div');
      card.className = 'recommend-card';
      card.innerHTML = `
        <div class="booth-icon" style="background:${r.booth.color}">${r.booth.icon}</div>
        <div class="recommend-card-info">
          <div class="recommend-card-name">${r.booth.name}</div>
          <div class="recommend-card-reason">${r.booth.company}</div>
          <div class="recommend-card-perspective">👀 ${perspective}</div>
        </div>`;
      recommendList.appendChild(card);
    });
  }

  // 日常アクション（タイプ×関心軸の掛け合わせ）
  const actions = ACTIONS[axisName][dominantInterest];
  const actionList = document.getElementById('actionList');
  actionList.innerHTML = '';
  actions.forEach((action, i) => {
    const card = document.createElement('div');
    card.className = 'action-card';
    card.innerHTML = `<div class="action-num">${i + 1}</div><div class="action-text">${action}</div>`;
    actionList.appendChild(card);
  });
}

document.getElementById('reviewBackBtn').addEventListener('click', () => {
  showScreen('listScreen');
  renderList();
});

/* ===== 初期描画 ===== */
renderList();
</script>
</body>
</html>
