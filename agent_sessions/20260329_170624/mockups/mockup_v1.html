<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ワクワクマップ</title>
<style>
:root {
  --primary: #FF6B35;
  --primary-light: #FFF0E8;
  --secondary: #4ECDC4;
  --accent: #FFE66D;
  --bg: #FAFAFA;
  --text: #2D3436;
  --text-light: #636E72;
  --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: #F0F0F0;
  color: var(--text);
  display: flex;
  justify-content: center;
  min-height: 100dvh;
}

.app {
  width: 100%;
  max-width: 430px;
  background: var(--bg);
  min-height: 100dvh;
  position: relative;
  overflow-x: hidden;
}

.screen {
  display: none;
  min-height: 100dvh;
  padding: 0 0 100px;
}
.screen.active { display: block; }

/* ===== スタート画面 ===== */
#startScreen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
  background: linear-gradient(160deg, #FFF0E8 0%, #E8FFF8 50%, #FFF8E0 100%);
}
#startScreen.active { display: flex; }

.start-title {
  font-size: 32px;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 8px;
  letter-spacing: 2px;
}
.start-subtitle {
  font-size: 14px;
  color: var(--text-light);
  margin-bottom: 32px;
}
.start-chart-container {
  width: 200px;
  height: 200px;
  margin-bottom: 24px;
  opacity: 0.4;
}
.start-message {
  font-size: 15px;
  color: var(--text-light);
  margin-bottom: 32px;
  line-height: 1.6;
}
.start-btn {
  width: 100%;
  max-width: 280px;
  padding: 16px;
  background: var(--primary);
  color: #FFF;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}
.start-btn:active { transform: scale(0.97); }

/* ===== ヘッダー ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #FFF;
  padding: 12px 16px 8px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.header-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--primary);
}
.user-switcher {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--primary-light);
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  border: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
}
.user-switcher svg { width: 14px; height: 14px; }

.mini-chart-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0 4px;
}
.mini-chart { width: 48px; height: 48px; }
.mini-chart-info {
  font-size: 12px;
  color: var(--text-light);
  line-height: 1.5;
}
.mini-chart-info strong {
  color: var(--text);
  font-size: 14px;
}

/* ===== ブース一覧 ===== */
.booth-list { padding: 16px; }
.section-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-light);
  margin-bottom: 12px;
  padding-left: 4px;
}

.booth-card {
  background: #FFF;
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--card-shadow);
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.15s;
  position: relative;
  overflow: hidden;
}
.booth-card:active { transform: scale(0.98); }
.booth-card.recorded {
  border-left: 4px solid var(--secondary);
}
.booth-card.recorded::after {
  content: '\2713';
  position: absolute;
  top: 8px;
  right: 12px;
  color: var(--secondary);
  font-weight: 700;
  font-size: 16px;
}

.booth-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.booth-info { flex: 1; }
.booth-name {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 2px;
}
.booth-company {
  font-size: 12px;
  color: var(--text-light);
}
.booth-tags {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.booth-tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: #F0F0F0;
  color: var(--text-light);
}

/* ===== リマインドバナー ===== */
.remind-banner {
  display: none;
  margin: 0 16px 12px;
  padding: 12px 16px;
  background: linear-gradient(135deg, #FFF8E0, #FFF0E8);
  border-radius: 12px;
  font-size: 13px;
  color: var(--text);
  align-items: center;
  gap: 8px;
  animation: slideDown 0.3s ease;
}
.remind-banner.show { display: flex; }
.remind-banner-icon { font-size: 20px; }
.remind-banner-close {
  margin-left: auto;
  background: none;
  border: none;
  font-size: 18px;
  color: var(--text-light);
  cursor: pointer;
  padding: 0 4px;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== Fixed下部ふりかえりボタン ===== */
.fixed-review-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: #FFF;
  padding: 12px 16px;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
  z-index: 100;
}
.review-btn {
  width: 100%;
  padding: 16px;
  background: var(--primary);
  color: #FFF;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s;
}
.review-btn:active { transform: scale(0.97); }
.review-btn:disabled {
  opacity: 0.35;
  cursor: default;
}

/* ===== 記録画面 ===== */
#recordScreen {
  background: linear-gradient(180deg, #FFF 0%, #F8F8F8 100%);
}
.record-header {
  padding: 20px 16px 16px;
  text-align: center;
}
.record-booth-name {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 4px;
}
.record-company {
  font-size: 13px;
  color: var(--text-light);
}
.record-step-indicator {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 20px 0;
}
.step-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #DDD;
  transition: background 0.2s, transform 0.2s;
}
.step-dot.active {
  background: var(--primary);
  transform: scale(1.3);
}
.step-dot.done { background: var(--secondary); }

.question-area {
  padding: 0 24px;
  text-align: center;
}
.question-text {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 24px;
  line-height: 1.5;
}

/* 横並び絵文字カード */
.choices {
  display: flex;
  flex-direction: row;
  gap: 10px;
  justify-content: center;
  max-width: 340px;
  margin: 0 auto;
}
.choice-btn {
  flex: 1;
  padding: 16px 8px 12px;
  border: 2px solid #E8E8E8;
  border-radius: 16px;
  background: #FFF;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.choice-btn:active { transform: scale(0.94); }
.choice-btn.selected {
  border-color: var(--primary);
  background: var(--primary-light);
  transform: scale(1.05);
}
.choice-emoji { font-size: 48px; line-height: 1; }
.choice-label { font-size: 10px; font-weight: 600; color: var(--text-light); line-height: 1.3; }
.choice-btn.selected .choice-label { color: var(--primary); }

.record-chart-preview {
  display: flex;
  justify-content: center;
  margin: 32px 0 16px;
}
.record-chart-preview svg { width: 160px; height: 160px; }

.record-done-msg {
  text-align: center;
  padding: 32px 24px;
  animation: fadeUp 0.4s ease;
}
.record-done-msg h2 {
  font-size: 22px;
  margin-bottom: 8px;
}
.record-done-msg p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}
.record-done-actions {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}
.record-next-btn {
  padding: 14px 32px;
  background: var(--primary);
  color: #FFF;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s;
}
.record-next-btn:active { transform: scale(0.97); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== 名前入力モーダル（初回記録時） ===== */
.name-modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 300;
  justify-content: center;
  align-items: center;
}
.name-modal-overlay.show { display: flex; }
.name-modal {
  width: 90%;
  max-width: 320px;
  background: #FFF;
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  animation: fadeUp 0.3s ease;
}
.name-modal h2 {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 8px;
}
.name-modal p {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 20px;
  line-height: 1.5;
}
.name-modal input {
  width: 100%;
  padding: 14px 20px;
  border: 2px solid #DDD;
  border-radius: 12px;
  font-size: 18px;
  text-align: center;
  outline: none;
  margin-bottom: 14px;
  transition: border-color 0.2s;
}
.name-modal input:focus { border-color: var(--primary); }
.name-modal-btn {
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: #FFF;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}
.name-modal-btn:disabled { opacity: 0.4; cursor: default; }

/* ===== ふりかえり画面 ===== */
#reviewScreen {
  background: linear-gradient(180deg, #FFF0E8 0%, #E8FFF8 50%, #FFF8E0 100%);
}
.review-header {
  text-align: center;
  padding: 32px 24px 16px;
}
.review-header h1 {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 4px;
}
.review-header p {
  font-size: 13px;
  color: var(--text-light);
}

.review-chart-area {
  display: flex;
  justify-content: center;
  padding: 16px 0;
}
.review-chart-area svg { width: 260px; height: 260px; }

.type-card {
  margin: 0 16px 16px;
  background: #FFF;
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: var(--card-shadow);
  text-align: center;
}
.type-label {
  font-size: 12px;
  color: var(--text-light);
  margin-bottom: 4px;
}
.type-name {
  font-size: 26px;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 8px;
}
.type-desc {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

/* 体験からの気づきカード */
.insight-card {
  margin: 0 16px 16px;
  background: linear-gradient(135deg, #FFF8E0, #FFF0E8);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--card-shadow);
}
.insight-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 8px;
}
.insight-text {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}

.recommend-section {
  padding: 0 16px 16px;
}
.recommend-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 12px;
  padding-left: 4px;
}
.recommend-card {
  background: #FFF;
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--card-shadow);
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.recommend-card .booth-icon { width: 40px; height: 40px; font-size: 20px; border-radius: 10px; flex-shrink: 0; }
.recommend-card-info { flex: 1; }
.recommend-card-name { font-size: 14px; font-weight: 700; }
.recommend-card-reason { font-size: 12px; color: var(--text-light); margin-top: 2px; line-height: 1.5; }
.recommend-card-perspective {
  font-size: 12px;
  color: var(--primary);
  font-weight: 600;
  margin-top: 4px;
  line-height: 1.5;
}

.action-section { padding: 0 16px 16px; }
.action-card {
  background: #FFF;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--card-shadow);
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.action-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
  flex-shrink: 0;
}
.action-text { font-size: 14px; line-height: 1.6; }
.action-source {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 4px;
}

.screenshot-hint {
  text-align: center;
  padding: 8px 16px 16px;
  font-size: 12px;
  color: var(--text-light);
}

/* ===== ユーザー切替モーダル ===== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  justify-content: center;
  align-items: flex-end;
}
.modal-overlay.show { display: flex; }
.modal-sheet {
  width: 100%;
  max-width: 430px;
  background: #FFF;
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 40px;
  animation: sheetUp 0.3s ease;
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 16px;
  text-align: center;
}
.user-list { list-style: none; }
.user-item {
  padding: 14px 16px;
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.15s;
}
.user-item:hover { background: #F8F8F8; }
.user-item.current { background: var(--primary-light); font-weight: 700; }
.user-item-name { font-size: 16px; }
.user-item-count { font-size: 12px; color: var(--text-light); }

.add-user-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.add-user-row input {
  flex: 1;
  padding: 12px 16px;
  border: 2px solid #E8E8E8;
  border-radius: 10px;
  font-size: 15px;
  outline: none;
}
.add-user-row input:focus { border-color: var(--primary); }
.add-user-btn {
  padding: 12px 20px;
  background: var(--primary);
  color: #FFF;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  font-size: 14px;
  color: var(--primary);
  font-weight: 600;
  cursor: pointer;
  padding: 8px 0;
  margin: 12px 16px 0;
}
.back-btn svg { width: 18px; height: 18px; }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ===== スタート画面 ===== -->
  <div class="screen active" id="startScreen">
    <div class="start-title">ワクワクマップ</div>
    <div class="start-subtitle">ワークワクワク河内長野</div>
    <div class="start-chart-container">
      <svg id="startChart" viewBox="0 0 200 200"></svg>
    </div>
    <div class="start-message">これを今日の体験で<br>塗りつぶそう！</div>
    <button class="start-btn" id="startBtn">ブースを見る</button>
  </div>

  <!-- ===== ブース一覧画面 ===== -->
  <div class="screen" id="listScreen">
    <div class="header">
      <div class="header-top">
        <div class="header-title">ワクワクマップ</div>
        <button class="user-switcher" id="switchUserBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="currentUserLabel">-</span>
        </button>
      </div>
      <div class="mini-chart-row">
        <svg class="mini-chart" id="miniChart" viewBox="0 0 48 48"></svg>
        <div class="mini-chart-info">
          <strong id="recordCountLabel">0 / 8 体験済み</strong><br>
          <span id="miniChartHint">ブースを体験して記録しよう</span>
        </div>
      </div>
    </div>
    <div class="remind-banner" id="remindBanner">
      <span class="remind-banner-icon">💡</span>
      <span>さっきの体験、どうだった？<br>記録するともっとマップが育つよ！</span>
      <button class="remind-banner-close" id="remindClose">✕</button>
    </div>
    <div class="booth-list" id="boothList"></div>
    <div class="fixed-review-bar" id="fixedReviewBar">
      <button class="review-btn" id="goReviewBtn" disabled>ふりかえりを見る（あと2つ体験しよう！）</button>
    </div>
  </div>

  <!-- ===== 記録画面 ===== -->
  <div class="screen" id="recordScreen">
    <button class="back-btn" id="recordBackBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      もどる
    </button>
    <div class="record-header">
      <div class="record-booth-name" id="recordBoothName"></div>
      <div class="record-company" id="recordCompany"></div>
    </div>
    <div class="record-step-indicator" id="stepIndicator"></div>
    <div class="question-area" id="questionArea"></div>
    <div class="record-chart-preview" id="recordChartPreview">
      <svg id="recordChart" viewBox="0 0 200 200"></svg>
    </div>
  </div>

  <!-- ===== ふりかえり画面 ===== -->
  <div class="screen" id="reviewScreen">
    <button class="back-btn" id="reviewBackBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      もどる
    </button>
    <div class="review-header">
      <h1 id="reviewUserName"></h1>
      <p>きみのワクワクマップ</p>
    </div>
    <div class="review-chart-area">
      <svg id="reviewChart" viewBox="0 0 260 260"></svg>
    </div>
    <div class="type-card" id="typeCard">
      <div class="type-label">きみのワクワクタイプ</div>
      <div class="type-name" id="typeName"></div>
      <div class="type-desc" id="typeDesc"></div>
    </div>
    <div class="insight-card" id="insightCard">
      <div class="insight-label">💡 きみの体験からわかったこと</div>
      <div class="insight-text" id="insightText"></div>
    </div>
    <div class="recommend-section" id="recommendSection">
      <div class="recommend-title">🗺️ 次はこの観点で冒険しよう</div>
      <div id="recommendList"></div>
    </div>
    <div class="action-section">
      <div class="recommend-title">🏠 明日からやってみよう</div>
      <div id="actionList"></div>
    </div>
    <div class="screenshot-hint">📸 スクショして記念に残そう！</div>
  </div>

  <!-- ===== 名前入力モーダル ===== -->
  <div class="name-modal-overlay" id="nameModal">
    <div class="name-modal">
      <h2>きみの名前は？</h2>
      <p>記録するために名前を教えてね！<br>あとで変えられるよ</p>
      <input type="text" id="nameModalInput" placeholder="なまえを入れてね" maxlength="10">
      <button class="name-modal-btn" id="nameModalBtn" disabled>きろくをはじめる</button>
    </div>
  </div>

  <!-- ===== ユーザー切替モーダル ===== -->
  <div class="modal-overlay" id="userModal">
    <div class="modal-sheet">
      <div class="modal-title">だれが使う？</div>
      <ul class="user-list" id="userList"></ul>
      <div class="add-user-row">
        <input type="text" id="addUserInput" placeholder="なまえを追加" maxlength="10">
        <button class="add-user-btn" id="addUserBtn">追加</button>
      </div>
    </div>
  </div>
</div>

/* ===== レーダーチャート描画 ===== */
function drawRadar(svgEl, scores, size, opts = {}) {
  const { showLabels = false, showValues = false, animate = false } = opts;
  const cx = size / 2, cy = size / 2, r = size * 0.35;
  const n = AXES.length;
  let svg = '';

  for (let lv = 1; lv <= 3; lv++) {
    const rr = r * lv / 3;
    const pts = [];
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      pts.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
    }
    svg += `<polygon points="${pts.join(' ')}" fill="none" stroke="#E0E0E0" stroke-width="${lv===3?1.5:0.7}"/>`;
  }

  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x2 = cx + r * Math.cos(angle);
    const y2 = cy + r * Math.sin(angle);
    svg += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#E0E0E0" stroke-width="0.7"/>`;
  }

  const dataPts = [];
  for (let i = 0; i < n; i++) {
    const val = Math.min(scores[i] || 0, 1);
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const dr = r * (0.1 + 0.9 * val);
    dataPts.push(`${cx + dr * Math.cos(angle)},${cy + dr * Math.sin(angle)}`);
  }
  const hasData = scores.some(s => s > 0);
  if (hasData) {
    svg += `<polygon points="${dataPts.join(' ')}" fill="rgba(255,107,53,0.15)" stroke="var(--primary)" stroke-width="2" stroke-linejoin="round"${animate ? ' style="animation:fadeUp 0.5s ease"' : ''}/>`;
    for (let i = 0; i < n; i++) {
      if ((scores[i] || 0) > 0) {
        svg += `<circle cx="${dataPts[i].split(',')[0]}" cy="${dataPts[i].split(',')[1]}" r="3.5" fill="var(--primary)"/>`;
      }
    }
  }

  if (showLabels) {
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const lr = r + size * 0.12;
      const lx = cx + lr * Math.cos(angle);
      const ly = cy + lr * Math.sin(angle);
      const val = scores[i] || 0;
      const color = val > 0 ? AXIS_COLORS[i] : '#AAA';
      const fontSize = size > 100 ? 12 : 6;
      svg += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" fill="${color}" font-size="${fontSize}" font-weight="700">${AXES[i]}</text>`;
      if (showValues && val === 0) {
        const vly = ly + fontSize + 2;
        svg += `<text x="${lx}" y="${vly}" text-anchor="middle" fill="#CCC" font-size="${fontSize * 0.7}">未冒険</text>`;
      }
    }
  }

  svgEl.innerHTML = svg;
}

/* ===== ユーザーのスコア計算 ===== */
function calcScores(user) {
  const scores = [0,0,0,0,0,0];
  const records = user.records;
  const count = Object.keys(records).length;
  if (count === 0) return scores;

  for (const boothId in records) {
    const booth = BOOTHS.find(b => b.id === parseInt(boothId));
    if (!booth) continue;
    const rec = records[boothId];
    let weight = 1;
    if (rec.q1 === 'fun') weight = 1.0;
    else if (rec.q1 === 'wow') weight = 1.2;
    else if (rec.q1 === 'curious') weight = 1.1;
    let diffBonus = 0;
    if (rec.q2 === 'hard') diffBonus = 0.15;
    else if (rec.q2 === 'normal') diffBonus = 0.05;

    for (let i = 0; i < 6; i++) {
      scores[i] += booth.axes[i] * weight + (booth.axes[i] > 0 ? diffBonus : 0);
    }
  }

  const max = Math.max(...scores, 0.001);
  return scores.map(s => Math.min(s / max, 1));
}

function renderList() {
  const user = getCurrentUser(appState);
  const displayName = user.name || 'ゲスト';

  const recordCount = Object.keys(user.records).length;
  document.getElementById('recordCountLabel').textContent = `${recordCount} / ${BOOTHS.length} 体験済み`;

  if (recordCount === 0) {
    document.getElementById('miniChartHint').textContent = 'ブースを体験して記録しよう';
  } else if (recordCount < 2) {
    document.getElementById('miniChartHint').textContent = 'あと少しでタイプ診断ができるよ！';
  } else {
    document.getElementById('miniChartHint').textContent = 'ふりかえりで診断結果を見よう！';
  }

  const scores = calcScores(user);
  drawRadar(document.getElementById('miniChart'), scores, 48);

  const goReviewBtn = document.getElementById('goReviewBtn');
  const remaining = 2 - recordCount;
  if (remaining > 0) {
    goReviewBtn.disabled = true;
    goReviewBtn.textContent = `ふりかえりを見る（あと${remaining}つ体験しよう！）`;
  } else {
    goReviewBtn.disabled = false;
    goReviewBtn.textContent = 'ふりかえりを見る 🔍';
  }

  const banner = document.getElementById('remindBanner');
  if (recordCount > 0 && recordCount < BOOTHS.length) {
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }

  const list = document.getElementById('boothList');
  list.innerHTML = '<div class="section-label">今日のブース</div>';
  BOOTHS.forEach(booth => {
    const recorded = !!user.records[booth.id];
    const card = document.createElement('div');
    card.className = 'booth-card' + (recorded ? ' recorded' : '');
    card.innerHTML = `
      <div class="booth-icon" style="background:${booth.color}">${booth.icon}</div>
      <div class="booth-info">
        <div class="booth-name">${booth.name}</div>
        <div class="booth-company">${booth.company}</div>
        <div class="booth-tags"><span class="booth-tag">${booth.category}</span></div>
      </div>
    `;
    card.addEventListener('click', () => onBoothTap(booth));
    list.appendChild(card);
  });
}

  document.getElementById('recordBoothName').textContent = booth.name;
  document.getElementById('recordCompany').textContent = booth.company;
  renderStep();
  showScreen('recordScreen');
}

function renderStep() {
  const indicator = document.getElementById('stepIndicator');
  indicator.innerHTML = '';
  for (let i = 0; i < QUESTIONS.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (i === currentStep ? ' active' : (i < currentStep ? ' done' : ''));
    indicator.appendChild(dot);
  }

  const area = document.getElementById('questionArea');
  const chartPreview = document.getElementById('recordChartPreview');

  if (currentStep >= QUESTIONS.length) {
    area.innerHTML = '';
    const doneDiv = document.createElement('div');
    doneDiv.className = 'record-done-msg';
    doneDiv.innerHTML = `
      <h2>きろくできた！ 🎉</h2>
      <p>マップが少し育ったよ。<br>ほかのブースも体験してみよう！</p>
      <div class="record-done-actions">
        <button class="record-next-btn" id="recordNextBtn">つぎのブースへ →</button>
      </div>
    `;
    area.appendChild(doneDiv);

    document.getElementById('recordNextBtn').addEventListener('click', () => {
      showScreen('listScreen');
      renderList();
    });

    const user = getCurrentUser(appState);
    const scores = calcScores(user);
    chartPreview.style.display = 'flex';
    drawRadar(document.getElementById('recordChart'), scores, 200, { showLabels: true, animate: true });
    return;
  }

  chartPreview.style.display = 'none';
  const q = QUESTIONS[currentStep];
  area.innerHTML = `<div class="question-text">${q.text}</div>`;
  const choicesDiv = document.createElement('div');
  choicesDiv.className = 'choices';
  q.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    const prevAnswer = recordAnswers[`q${currentStep + 1}`];
    if (prevAnswer === c.value) btn.classList.add('selected');
    btn.innerHTML = `<span class="choice-emoji">${c.emoji}</span><span class="choice-label">${c.label}</span>`;
    btn.addEventListener('click', () => {
      recordAnswers[`q${currentStep + 1}`] = c.value;
      const user = getCurrentUser(appState);
      user.records[currentBooth.id] = { ...recordAnswers };
      saveState(appState);
      currentStep++;
      setTimeout(renderStep, 200);
    });
    choicesDiv.appendChild(btn);
  });
  area.appendChild(choicesDiv);
}

document.getElementById('recordBackBtn').addEventListener('click', () => {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
  } else {
    showScreen('listScreen');
    renderList();
  }
});

/* ===== ふりかえり画面（v3: 個別化ロジック） ===== */
function renderReview() {
  const user = getCurrentUser(appState);
  const scores = calcScores(user);
  const displayName = user.name || 'ゲスト';
  const records = user.records;

  document.getElementById('reviewUserName').textContent = `${displayName}のワクワクマップ`;
  drawRadar(document.getElementById('reviewChart'), scores, 260, { showLabels: true, showValues: true, animate: true });

  // === タイプ判定 ===
  let maxIdx = 0;
  for (let i = 1; i < scores.length; i++) {
    if (scores[i] > scores[maxIdx]) maxIdx = i;
  }
  const topAxis = AXES[maxIdx];
  const typeName = TYPE_NAMES[topAxis];
  document.getElementById('typeName').textContent = `${topAxis}タイプ — ${typeName}`;

  // === 体験パターン抽象化メッセージ（v3新規） ===
  // 記録された感情×ブース軸の最頻パターンを特定し、動的に説明文を生成
  const patternCounts = {};
  for (const boothId in records) {
    const booth = BOOTHS.find(b => b.id === parseInt(boothId));
    if (!booth) continue;
    const rec = records[boothId];
    const emotion = rec.q1; // fun / wow / curious
    // このブースで最も強い軸を特定
    let strongestAxisIdx = 0;
    let strongestVal = 0;
    for (let i = 0; i < 6; i++) {
      if (booth.axes[i] > strongestVal) {
        strongestVal = booth.axes[i];
        strongestAxisIdx = i;
      }
    }
    const key = `${emotion}×${AXES[strongestAxisIdx]}`;
    patternCounts[key] = (patternCounts[key] || 0) + 1;
  }

  // 最頻パターンを取得
  let dominantPattern = '';
  let dominantCount = 0;
  for (const key in patternCounts) {
    if (patternCounts[key] > dominantCount) {
      dominantCount = patternCounts[key];
      dominantPattern = key;
    }
  }

  const patternText = EMOTION_AXIS_PATTERNS[dominantPattern] || `いろんな分野にバランスよく興味を持てるタイプ`;
  document.getElementById('typeDesc').textContent = `きみは${patternText}！`;

  // === 体験からの気づき（v3新規：具体的なブース名を使った抽象化） ===
  const insightCard = document.getElementById('insightCard');
  const insightText = document.getElementById('insightText');
  const recordedBooths = Object.keys(records).map(id => {
    const booth = BOOTHS.find(b => b.id === parseInt(id));
    return { booth, rec: records[id] };
  }).filter(r => r.booth);

  if (recordedBooths.length >= 2) {
    // 感情が同じブースをグルーピングして共通点を見つける
    const byEmotion = { fun: [], wow: [], curious: [] };
    recordedBooths.forEach(r => {
      if (byEmotion[r.rec.q1]) byEmotion[r.rec.q1].push(r.booth);
    });

    let insightMsg = '';
    const emotionLabels = { fun: '「たのしい！」', wow: '「すごい！」', curious: '「もっと知りたい！」' };

    // 同じ感情で2件以上あればパターンを指摘
    for (const emo in byEmotion) {
      if (byEmotion[emo].length >= 2) {
        const names = byEmotion[emo].map(b => b.name).join('と');
        insightMsg = `${names}で${emotionLabels[emo]}と感じたね。`;
        // 共通する強い軸を見つける
        const axisTotals = [0,0,0,0,0,0];
        byEmotion[emo].forEach(b => {
          for (let i = 0; i < 6; i++) axisTotals[i] += b.axes[i];
        });
        let commonAxisIdx = 0;
        for (let i = 1; i < 6; i++) {
          if (axisTotals[i] > axisTotals[commonAxisIdx]) commonAxisIdx = i;
        }
        insightMsg += `どちらも「${AXES[commonAxisIdx]}」の要素が強い体験だよ。きみは${AXES[commonAxisIdx]}の分野で力を発揮できそう！`;
        break;
      }
    }

    // 同じ感情が2件ない場合は、全体の傾向で述べる
    if (!insightMsg) {
      const boothNames = recordedBooths.map(r => r.booth.name);
      const emotions = recordedBooths.map(r => emotionLabels[r.rec.q1]);
      insightMsg = `${boothNames[0]}では${emotions[0]}、${boothNames[1]}では${emotions[1]}と感じたね。`;
      insightMsg += `いろんな感じ方ができるのがきみの強み。いろんな体験に飛び込んでみよう！`;
    }

    insightText.textContent = insightMsg;
    insightCard.style.display = 'block';
  } else {
    insightCard.style.display = 'none';
  }

  // === おすすめブース＋「観点」付与（v3改修） ===
  const unvisited = BOOTHS.filter(b => !records[b.id]);
  // 最も弱い軸（未冒険 or 最低スコア）を特定
  let weakestAxisIdx = 0;
  let weakestScore = Infinity;
  for (let i = 0; i < scores.length; i++) {
    if (scores[i] < weakestScore) {
      weakestScore = scores[i];
      weakestAxisIdx = i;
    }
  }
  const weakestAxis = AXES[weakestAxisIdx];

  const ranked = unvisited.map(b => {
    let affinity = 0;
    for (let i = 0; i < 6; i++) affinity += b.axes[i] * (1 - (scores[i] || 0));
    return { booth: b, affinity };
  }).sort((a, b) => b.affinity - a.affinity);

  const recommendList = document.getElementById('recommendList');
  const recommendSection = document.getElementById('recommendSection');
  if (ranked.length === 0) {
    recommendSection.style.display = 'none';
  } else {
    recommendSection.style.display = 'block';
    recommendList.innerHTML = '';
    ranked.slice(0, 2).forEach(r => {
      // このブースの最強軸を特定
      let boothStrongIdx = 0;
      let boothStrongVal = 0;
      for (let i = 0; i < 6; i++) {
        if (r.booth.axes[i] > boothStrongVal) {
          boothStrongVal = r.booth.axes[i];
          boothStrongIdx = i;
        }
      }
      const boothStrongAxis = AXES[boothStrongIdx];

      // 「なぜこの観点で行くべきか」の理由文を生成
      const relationKey = `${topAxis}→${boothStrongAxis}`;
      const perspective = AXIS_RELATIONS[relationKey] || `「${boothStrongAxis}」の視点で新しい発見があるよ`;

      const card = document.createElement('div');
      card.className = 'recommend-card';
      card.innerHTML = `
        <div class="booth-icon" style="background:${r.booth.color}">${r.booth.icon}</div>
        <div class="recommend-card-info">
          <div class="recommend-card-name">${r.booth.name}</div>
          <div class="recommend-card-reason">きみの「${topAxis}」体験が多いから、次は「${boothStrongAxis}」の視点で見てみよう</div>
          <div class="recommend-card-perspective">→ ${perspective}</div>
        </div>
      `;
      recommendList.appendChild(card);
    });
  }

  // === 日常アクション（v3改修：afterActionsから感情別に選出） ===
  const actionList = document.getElementById('actionList');
  actionList.innerHTML = '';
  const actions = [];

  for (const boothId in records) {
    const booth = BOOTHS.find(b => b.id === parseInt(boothId));
    if (!booth) continue;
    const rec = records[boothId];
    const emotion = rec.q1; // fun / wow / curious
    const action = booth.afterActions[emotion];
    if (action) {
      actions.push({ text: action, boothName: booth.name, emotion });
    }
  }

  // 最大3つ表示（記録数が多い場合は、感情の多様性を優先して選出）
  const selectedActions = [];
  const usedEmotions = new Set();
  // まず各感情から1つずつ選ぶ（多様性確保）
  for (const a of actions) {
    if (!usedEmotions.has(a.emotion) && selectedActions.length < 3) {
      selectedActions.push(a);
      usedEmotions.add(a.emotion);
    }
  }
  // 3つ未満なら残りから補填
  for (const a of actions) {
    if (selectedActions.length >= 3) break;
    if (!selectedActions.includes(a)) {
      selectedActions.push(a);
    }
  }

  selectedActions.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'action-card';
    card.innerHTML = `
      <div class="action-num">${i + 1}</div>
      <div>
        <div class="action-text">${a.text}</div>
        <div class="action-source">← ${a.boothName}の体験から</div>
      </div>
    `;
    actionList.appendChild(card);
  });
}

document.getElementById('reviewBackBtn').addEventListener('click', () => {
  showScreen('listScreen');
  renderList();
});
</script>
