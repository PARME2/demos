<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=375, maximum-scale=1, user-scalable=no">
<title>業界AIガイド - ガイドくん</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#1D9E75;--primary-light:#2BB88A;--primary-dark:#167A5B;--bg:#E1F5EE;--bg-card:#EEFAF5;--white:#FFFFFF;--text:#1A2E28;--text-light:#4A6960;--text-muted:#8FA8A0;--bubble-ai:#FFFFFF;--bubble-user:#1D9E75;--shadow:0 2px 12px rgba(29,158,117,0.1);--shadow-lg:0 8px 32px rgba(29,158,117,0.15)}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh;max-width:375px;margin:0 auto;background:var(--bg);position:relative}

/* Header */
.header{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:10;box-shadow:0 2px 16px rgba(29,158,117,0.25)}
.header-avatar{width:40px;height:40px;background:rgba(255,255,255,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.header-info{flex:1}
.header-name{color:#fff;font-size:16px;font-weight:700;letter-spacing:0.3px}
.header-status{color:rgba(255,255,255,0.8);font-size:11px;display:flex;align-items:center;gap:4px}
.header-status::before{content:'';width:6px;height:6px;background:#A0F0C0;border-radius:50%;display:inline-block}
.header-btn{width:36px;height:36px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.header-btn:active{background:rgba(255,255,255,0.3)}

/* Chat Area */
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.chat-area::-webkit-scrollbar{display:none}

.date-divider{text-align:center;margin:8px 0 12px;position:relative}
.date-divider span{background:var(--bg);color:var(--text-muted);font-size:11px;padding:0 12px;position:relative;z-index:1}
.date-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(29,158,117,0.15)}

/* Messages */
.msg-row{display:flex;gap:8px;align-items:flex-end;max-width:90%;margin-bottom:4px}
.msg-row.ai{align-self:flex-start}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-bottom:2px}
.msg-row.user .msg-avatar{display:none}
.msg-content{display:flex;flex-direction:column;gap:2px}
.msg-bubble{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.65;word-break:break-word;animation:bubbleIn 0.3s cubic-bezier(0.175,0.885,0.32,1.1)}
@keyframes bubbleIn{from{opacity:0;transform:scale(0.8) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.msg-row.ai .msg-bubble{background:var(--bubble-ai);color:var(--text);border-bottom-left-radius:6px;box-shadow:var(--shadow)}
.msg-row.user .msg-bubble{background:var(--bubble-user);color:#fff;border-bottom-right-radius:6px;box-shadow:0 2px 12px rgba(29,158,117,0.25)}
.msg-time{font-size:10px;color:var(--text-muted);padding:0 4px;margin-top:1px}
.msg-row.user .msg-time{text-align:right}

/* Typing */
.typing-indicator{display:flex;gap:4px;padding:12px 16px;align-items:center}
.typing-indicator .dot{width:7px;height:7px;background:var(--text-muted);border-radius:50%;animation:typingDot 1.4s ease-in-out infinite}
.typing-indicator .dot:nth-child(2){animation-delay:0.2s}
.typing-indicator .dot:nth-child(3){animation-delay:0.4s}
@keyframes typingDot{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-6px);opacity:1}}

/* Quick Replies */
.quick-replies-wrap{padding:6px 16px 4px;overflow-x:auto;white-space:nowrap;display:flex;gap:8px;scrollbar-width:none}
.quick-replies-wrap::-webkit-scrollbar{display:none}
.chip{display:inline-block;background:var(--white);border:1.5px solid var(--primary);color:var(--primary);padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;flex-shrink:0;user-select:none}
.chip:active{background:var(--primary);color:#fff;transform:scale(0.95)}

/* Input Bar */
.input-bar{padding:8px 12px 12px;background:var(--white);border-top:1px solid rgba(29,158,117,0.1);display:flex;align-items:flex-end;gap:8px}
.input-bar textarea{flex:1;border:1.5px solid rgba(29,158,117,0.2);border-radius:22px;padding:10px 16px;font-size:14px;font-family:inherit;resize:none;outline:none;max-height:100px;min-height:40px;line-height:1.5;transition:border-color 0.2s;background:var(--bg-card)}
.input-bar textarea:focus{border-color:var(--primary)}
.input-bar textarea::placeholder{color:var(--text-muted)}
.send-btn{width:40px;height:40px;background:var(--primary);border:none;border-radius:50%;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;box-shadow:0 2px 8px rgba(29,158,117,0.3)}
.send-btn:active{transform:scale(0.9)}
.send-btn:disabled{background:var(--text-muted);box-shadow:none}

/* Company Card */
.company-card{background:var(--white);border:1.5px solid rgba(29,158,117,0.15);border-radius:16px;padding:14px;margin:6px 0;animation:cardIn 0.5s ease;max-width:280px;box-shadow:var(--shadow)}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.company-card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.company-card-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.company-card-name{font-size:14px;font-weight:700;color:var(--text)}
.company-card-industry{font-size:11px;color:var(--text-muted)}
.company-card-stats{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.company-stat{background:var(--bg-card);border-radius:8px;padding:6px 10px;flex:1;min-width:70px}
.company-stat-label{font-size:10px;color:var(--text-muted)}
.company-stat-value{font-size:13px;font-weight:700;color:var(--primary-dark)}
.company-card-fact{font-size:12px;color:var(--text-light);line-height:1.6;padding:8px 0;border-top:1px solid rgba(29,158,117,0.08)}
.company-card-actions{display:flex;gap:8px;margin-top:8px}
.company-btn{flex:1;padding:8px 10px;border-radius:10px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit;text-align:center}
.company-btn.primary{background:var(--primary);color:#fff}
.company-btn.secondary{background:var(--bg-card);color:var(--primary);border:1.5px solid var(--primary)}
.company-btn:active{transform:scale(0.95)}

/* Reminder banner */
.reminder{background:rgba(29,158,117,0.08);border-radius:12px;padding:8px 12px;margin:8px 0;text-align:center;font-size:12px;color:var(--text-light);animation:fadeIn 0.5s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Safe notice */
.safe-notice{text-align:center;padding:8px 24px;margin-bottom:8px}
.safe-notice p{font-size:11px;color:var(--text-muted);line-height:1.5;background:rgba(29,158,117,0.06);padding:8px 12px;border-radius:12px;display:inline-block}

/* Overlay / Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
.overlay.show{opacity:1;pointer-events:auto}
.modal-card{background:var(--white);border-radius:20px;max-width:340px;width:90%;padding:24px 20px;transform:scale(0.9);transition:transform 0.35s cubic-bezier(0.22,1,0.36,1);box-shadow:var(--shadow-lg)}
.overlay.show .modal-card{transform:scale(1)}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:20px;color:var(--text-muted);cursor:pointer}

::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-avatar">🔍</div>
    <div class="header-info">
      <div class="header-name">ガイドくん</div>
      <div class="header-status">業界なんでも聞いてね</div>
    </div>
    <button class="header-btn" onclick="showBookmarks()">📌</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="safe-notice">
      <p>🌟 どんな質問でもOK！ざっくりした疑問でも大丈夫だよ</p>
    </div>
    <div class="date-divider"><span>今日</span></div>
  </div>

  <div class="quick-replies-wrap" id="quickReplies"></div>

  <div class="input-bar">
    <textarea id="userInput" rows="1" placeholder="業界について聞いてみよう..." oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 20V14L11 12L3 10V4L22 12L3 20Z" fill="currentColor"/></svg>
    </button>
  </div>
</div>

<!-- Company Detail Modal -->
<div class="overlay" id="companyModal">
  <div class="modal-card" style="position:relative" id="companyModalContent">
  </div>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const quickRepliesEl = document.getElementById('quickReplies');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

let currentPath = null;
let pathStep = 0;
let msgCount = 0;
let bookmarkedCompanies = [];

const initialChips = ['農業って儲かるの？', 'IT企業ってスーツ着るの？', '地元に面白い会社ある？', '公務員ってどんな仕事？'];

const companies = {

    industry: '農業・有機野菜',
    employees: '8名',
    founded: '2019年',
    revenue: '年商3,000万円',
    fact: '20代のスタッフが3人在籍。有機野菜のネット直販が好調で、SNSフォロワー1.2万人！',
    location: '市内緑町'
  },
  techlab: {
    name: 'テックラボ',
    icon: '💻',
    industry: 'IT・ソフトウェア開発',
    employees: '25名',
    founded: '2016年',
    revenue: '年商2億円',
    fact: '完全私服OK、リモートワーク週3日可能。地元高校生のインターンも受け入れ中！',
    location: '駅前テックビル3F'
  },
  sakura: {
    name: 'さくら観光',
    icon: '🌸',
    industry: '観光・ツーリズム',
    employees: '15名',
    founded: '2012年',
    revenue: '年商8,000万円',
    fact: '地元の自然を活かしたエコツーリズムが大人気。外国人観光客が3年で5倍に！',
    location: '市内桜通り'
  },
  koubou: {
    name: 'ものづくり工房 匠',
    icon: '🔧',
    industry: '製造業・伝統工芸',
    employees: '12名',
    founded: '1985年',
    revenue: '年商1.5億円',
    fact: '伝統工芸×最新技術のハイブリッド。海外からの注文が全体の40%を占める！',
    location: '工業団地内'
  }
};

const conversations = {
  '農業って儲かるの？': [
    { ai: ['いい質問！💡', '実は農業って、やり方次第でかなり変わるんだ。'], chips: [] },
    { ai: ['例えば、この地域の「みどりファーム」は有機野菜の直販で年商3000万円。20代のスタッフが3人いるよ 🧑‍🌾'], company: 'midori', chips: [] },
    { ai: ['でも大変なこともあって、天候リスクや体力面はやっぱりあるよ。', 'ただ最近は「スマート農業」って言って、ドローンやAIを使った農業も増えてるんだ 🚁'], chips: ['もっと詳しく', '他の業界も聞きたい', 'みどりファームについて知りたい'] },
    {
      'もっと詳しく': { ai: ['農業の新しい形を紹介するね！', '実は今、こんなトレンドがあるよ：\n\n🌱 有機・オーガニック需要の増加\n📱 ネット直販（中間マージンなし）\n🤖 スマート農業（自動化）\n🏪 農家レストラン・体験型農業', '特にネット直販は、若い農家さんに人気。SNSで直接お客さんとつながれるからね！'], chips: ['スマート農業って？', '他の業界も知りたい'] },
      '他の業界も聞きたい': { ai: ['もちろん！他にどんな業界が気になる？ 😊'], chips: initialChips.filter(c => c !== '農業って儲かるの？') },
      'みどりファームについて知りたい': { ai: ['みどりファームの詳細だよ！ 🌿'], companyDetail: 'midori', chips: ['他の地元企業も知りたい', '農業についてもっと聞きたい'] },
      'スマート農業って？': { ai: ['スマート農業は最先端だよ！ 🤖', 'ドローンで農薬散布、センサーで土壌管理、AIで収穫時期の予測...\n農業のイメージ変わるよね！', 'この地域でも導入してる農家さんが3軒あるんだ。'], chips: ['体験してみたい', '他の業界も知りたい'] },
      _default: { ai: ['農業に興味を持ってくれてありがとう！🌱', 'わからない言葉があったらいつでも聞いてね！'], chips: initialChips }
    }
  ],
  'IT企業ってスーツ着るの？': [
    { ai: ['ほぼ着ない！😄', '特にこの地域のIT企業はカジュアルなところが多いよ。'], chips: [] },
    { ai: ['例えば「テックラボ」は完全私服OK。リモートワークも週3日まで可能 💻'], company: 'techlab', chips: [] },
    { ai: ['ただし、お客さんに会う時だけはちょっときれいめにする人が多いかな 👔', 'IT企業って実は色んな種類があるんだよ。'], chips: ['どんな種類があるの？', 'テックラボについて知りたい', '他の業界も聞きたい'] },
    {
      'どんな種類があるの？': { ai: ['IT企業にも色々あるよ！\n\n🖥️ Web制作（ホームページ作り）\n📱 アプリ開発\n🔒 セキュリティ\n📊 データ分析\n🎮 ゲーム開発\n🤖 AI開発', '「プログラミング」だけがITじゃないんだ。デザイン、企画、営業...色んな仕事があるよ！'], chips: ['プログラミングできなくてもOK？', '地元のIT企業は？'] },
      'テックラボについて知りたい': { ai: ['テックラボの詳細！💻'], companyDetail: 'techlab', chips: ['他の地元企業も知りたい', 'IT業界についてもっと聞きたい'] },
      '他の業界も聞きたい': { ai: ['もちろん！何が気になる？ 😊'], chips: initialChips.filter(c => c !== 'IT企業ってスーツ着るの？') },
      'プログラミングできなくてもOK？': { ai: ['もちろんOK！👍', 'IT企業で働く人の半分以上はプログラマーじゃないよ。\n\n🎨 デザイナー\n📝 ライター\n📊 マーケター\n🤝 営業・カスタマーサポート\n📋 プロジェクトマネージャー', 'テックラボも25人中、エンジニアは10人だけ。'], chips: ['なるほど！', '他の業界も知りたい'] },
      '地元のIT企業は？': { ai: ['この地域にはIT企業が5社あるよ！', 'テックラボが一番大きくて、他にもフリーランスのエンジニアが20人くらいいるんだ 💻'], companyDetail: 'techlab', chips: ['他の業界も聞きたい'] },
      _default: { ai: ['IT業界に興味持ってくれて嬉しい！💻', 'もっと知りたいことがあったら何でも聞いてね！'], chips: initialChips }
    }
  ],
  '地元に面白い会社ある？': [
    { ai: ['あるよ！この地域、意外と面白い会社が多いんだ 🌟', 'いくつか紹介するね！'], chips: [] },
    { ai: ['まずはここ！伝統とテクノロジーの融合 🔧'], company: 'koubou', chips: [] },
    { ai: ['そしてこっちも注目！🌸'], company: 'sakura', chips: [] },
    { ai: ['他にもIT系の「テックラボ」や農業の「みどりファーム」もあるよ！', 'どれが気になる？'], chips: ['匠について詳しく', 'さくら観光について', 'テックラボが気になる', '全部気になる！'] },
    {
      '匠について詳しく': { ai: ['匠の詳細！🔧'], companyDetail: 'koubou', chips: ['他の企業も知りたい'] },
      'さくら観光について': { ai: ['さくら観光の詳細！🌸'], companyDetail: 'sakura', chips: ['他の企業も知りたい'] },
      'テックラボが気になる': { ai: ['テックラボの詳細！💻'], companyDetail: 'techlab', chips: ['他の企業も知りたい'] },
      '全部気になる！': { ai: ['全部に興味あるの最高！🎉', 'それぞれ特徴があるから、自分が「おもしろそう！」って思ったところから深堀りしてみると良いよ 😊', 'ちなみに、これらの企業は全部、高校生の見学やインターンを受け入れてるよ！'], chips: ['見学してみたい', '他にも質問ある'] },
      _default: { ai: ['地元の企業に興味を持ってくれてありがとう！🌟', '他にも気になることあったら聞いてね！'], chips: initialChips }
    }
  ],
  '公務員ってどんな仕事？': [
    { ai: ['公務員って一口に言っても、めちゃくちゃ種類があるんだよ！ 🏛️'], chips: [] },
    { ai: ['大きく分けると...\n\n🏫 教育系（先生、教育委員会）\n🏥 福祉系（相談員、保健師）\n🏗️ まちづくり系（都市計画、土木）\n📋 事務系（窓口、経理）\n🚒 安全系（消防、警察）\n🌿 環境系（環境保全、農業支援）', 'この地域の市役所だけでも300人くらい働いてるよ！'], chips: ['まちづくり系って？', '給料はどのくらい？', '公務員試験って難しい？'] },
    {
      'まちづくり系って？': { ai: ['まちづくり系は今めちゃくちゃ面白いよ！ 🏗️', 'この地域でも「空き家活用プロジェクト」「観光まちづくり」「移住促進」とか色んなことやってるんだ。', '実はさっき紹介したさくら観光は、市のまちづくり課と連携してエコツーリズムを始めたんだよ 🌸'], chips: ['面白そう！', '他の仕事も知りたい'] },
      '給料はどのくらい？': { ai: ['正直に言うね 💰', '初任給は大卒で約20万円。民間より少し低いかも。', 'でもメリットも大きいよ：\n\n✅ 安定してる（倒産しない）\n✅ 福利厚生が充実\n✅ 残業代がちゃんと出る\n✅ 育休が取りやすい', '長い目で見るとかなり安定した選択肢だよ。'], chips: ['なるほど', '他の業界と比べると？'] },
      '公務員試験って難しい？': { ai: ['正直、簡単ではないけど...不可能じゃない！📚', '高卒枠もあるし、最近は「人物重視」の試験も増えてるよ。', 'この地域だと倍率は3〜5倍くらい。ちゃんと準備すれば受かる人も多い！', 'わからない言葉があったら聞いてね！ 😊'], chips: ['どう準備すればいい？', '他の業界も知りたい'] },
      _default: { ai: ['公務員について知ってもらえて嬉しい！🏛️', '他にも気になる業界があったら聞いてね。'], chips: initialChips }
    }
  ]
};

window.addEventListener('load', () => {
  setTimeout(() => {
    addTypingThenMessages([
      'どんな業界でも聞いてね！ 🌟',
      '「農業って儲かるの？」みたいなざっくりした質問でOK！'
    ], () => {
      showChips(initialChips);
    });
  }, 600);
});

userInput.addEventListener('input', () => {
  sendBtn.disabled = userInput.value.trim() === '';
});
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (userInput.value.trim()) sendMessage();
  }
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;
  addUserBubble(text);
  userInput.value = '';
  userInput.style.height = 'auto';
  sendBtn.disabled = true;
  hideChips();
  processInput(text);
}

function addUserBubble(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="msg-content"><div class="msg-bubble">${esc(text)}</div><div class="msg-time">${timeNow()}</div></div>`;
  chatArea.appendChild(row);
  scrollBottom();
}

function addAIBubble(text) {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `<div class="msg-avatar">🔍</div><div class="msg-content"><div class="msg-bubble">${text}</div><div class="msg-time">${timeNow()}</div></div>`;
  chatArea.appendChild(row);
  scrollBottom();
}

function addTypingIndicator() {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'typingRow';
  row.innerHTML = `<div class="msg-avatar">🔍</div><div class="msg-content"><div class="msg-bubble"><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
  chatArea.appendChild(row);
  scrollBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typingRow');
  if (el) el.remove();
}

function addTypingThenMessages(messages, callback) {
  let i = 0;
  function next() {
    if (i >= messages.length) {
      if (callback) callback();
      return;
    }
    addTypingIndicator();
    const delay = 700 + Math.random() * 1000 + messages[i].length * 20;
    setTimeout(() => {
      removeTypingIndicator();
      addAIBubble(messages[i]);
      i++;
      msgCount++;
      setTimeout(next, 250);
    }, delay);
  }
  next();
}

function addCompanyCard(companyKey) {
  const c = companies[companyKey];
  if (!c) return;
  const card = document.createElement('div');
  card.className = 'company-card';
  card.innerHTML = `
    <div class="company-card-header">
      <div class="company-card-icon">${c.icon}</div>
      <div>
        <div class="company-card-name">${c.name}</div>
        <div class="company-card-industry">${c.industry}</div>
      </div>
    </div>
    <div class="company-card-stats">
      <div class="company-stat"><div class="company-stat-label">従業員</div><div class="company-stat-value">${c.employees}</div></div>
      <div class="company-stat"><div class="company-stat-label">設立</div><div class="company-stat-value">${c.founded}</div></div>
      <div class="company-stat"><div class="company-stat-label">売上</div><div class="company-stat-value">${c.revenue}</div></div>
    </div>
    <div class="company-card-fact">💡 ${c.fact}</div>
    <div class="company-card-actions">
      <button class="company-btn primary" onclick="showCompanyDetail('${companyKey}')">この企業をもっと知る →</button>
      <button class="company-btn secondary" onclick="mockOBVisit('${companyKey}')">📅 OB訪問</button>
    </div>
  `;
  chatArea.appendChild(card);
  scrollBottom();
}

function addCompanyDetailCard(companyKey) {
  addCompanyCard(companyKey);
}

function showCompanyDetail(key) {
  const c = companies[key];
  if (!c) return;
  const modal = document.getElementById('companyModal');
  const content = document.getElementById('companyModalContent');
  content.innerHTML = `
    <button class="modal-close" onclick="document.getElementById('companyModal').classList.remove('show')">&times;</button>
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:40px;margin-bottom:8px">${c.icon}</div>
      <div style="font-size:18px;font-weight:700;color:var(--text)">${c.name}</div>
      <div style="font-size:12px;color:var(--text-muted)">${c.industry} / ${c.location}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:var(--bg-card);padding:10px;border-radius:10px;text-align:center">
        <div style="font-size:10px;color:var(--text-muted)">従業員数</div>
        <div style="font-size:16px;font-weight:700;color:var(--primary)">${c.employees}</div>
      </div>
      <div style="background:var(--bg-card);padding:10px;border-radius:10px;text-align:center">
        <div style="font-size:10px;color:var(--text-muted)">設立年</div>
        <div style="font-size:16px;font-weight:700;color:var(--primary)">${c.founded}</div>
      </div>
      <div style="background:var(--bg-card);padding:10px;border-radius:10px;text-align:center;grid-column:1/-1">
        <div style="font-size:10px;color:var(--text-muted)">年間売上</div>
        <div style="font-size:16px;font-weight:700;color:var(--primary)">${c.revenue}</div>
      </div>
    </div>
    <div style="font-size:13px;color:var(--text);line-height:1.7;padding:12px;background:var(--bg-card);border-radius:10px;margin-bottom:14px">
      💡 ${c.fact}
    </div>
    <div style="display:flex;gap:8px">
      <button class="company-btn primary" style="flex:1;padding:12px" onclick="mockOBVisit('${key}');document.getElementById('companyModal').classList.remove('show')">📅 OB訪問を予約</button>
      <button class="company-btn secondary" style="flex:1;padding:12px" onclick="bookmarkCompany('${key}');document.getElementById('companyModal').classList.remove('show')">📌 ブックマーク</button>
    </div>
  `;
  modal.classList.add('show');
  modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('show'); };
}

function mockOBVisit(key) {
  const c = companies[key];
  hideChips();
  addTypingThenMessages([
    `${c.name}のOB訪問予約ページを準備中... 📅`,
    `（※これはデモです。実際のアプリでは予約フォームが表示されます！）`,
    `${c.name}には高校生向けの見学プログラムもあるよ！気になったら先生に相談してみてね 😊`
  ], () => {
    showChips(initialChips);
  });
}

function bookmarkCompany(key) {
  if (!bookmarkedCompanies.includes(key)) {
    bookmarkedCompanies.push(key);
  }
  addTypingThenMessages([`📌 ${companies[key].name}をブックマークしたよ！`], () => {
    showChips(initialChips);
  });
}

function showBookmarks() {
  if (bookmarkedCompanies.length === 0) {
    addTypingThenMessages(['まだブックマークした企業がないよ。気になる企業を見つけたらブックマークしてね！ 📌'], () => {
      showChips(initialChips);
    });
    return;
  }
  const names = bookmarkedCompanies.map(k => companies[k].name).join('、');
  addTypingThenMessages([`📌 ブックマークした企業：${names}`, 'どの企業についてもっと知りたい？'], () => {
    showChips(bookmarkedCompanies.map(k => companies[k].name + 'について'));
  });
}

function showChips(chips) {
  quickRepliesEl.innerHTML = '';
  chips.forEach(text => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = text;
    chip.onclick = () => chipClicked(text);
    quickRepliesEl.appendChild(chip);
  });
  quickRepliesEl.style.display = chips.length ? 'flex' : 'none';
}

function hideChips() {
  quickRepliesEl.innerHTML = '';
  quickRepliesEl.style.display = 'none';
}

function chipClicked(text) {
  addUserBubble(text);
  hideChips();
  processInput(text);
}

function processInput(text) {
  // Start new conversation path
  if (conversations[text] && !currentPath) {
    currentPath = text;
    pathStep = 0;
    runPathStep();
    return;
  }

  // Continue existing path
  if (currentPath) {
    pathStep++;
    runPathStep(text);
    return;
  }

  // Fallback
  const fallbacks = [
    ['面白い質問だね！ 😊', 'その業界についてはまだ詳しいデータがないんだけど、こっちの業界なら詳しく教えられるよ！'],
    ['なるほど、気になるよね！', 'もう少し具体的に聞いてくれると、もっと詳しく答えられるよ 💡'],
    ['いい視点だね！ 🌟', 'まずはこのあたりの業界から聞いてみない？']
  ];
  const f = fallbacks[Math.floor(Math.random() * fallbacks.length)];
  addTypingThenMessages(f, () => {
    showChips(initialChips);
  });
}

function runPathStep(userChoice) {
  const tree = conversations[currentPath];
  if (!tree || pathStep >= tree.length) {
    currentPath = null;
    pathStep = 0;
    showChips(initialChips);
    return;
  }

  const step = tree[pathStep];

  // Simple step with just AI messages
  if (step.ai && !step[userChoice] && !step._default) {
    const msgs = [...step.ai];
    addTypingThenMessages(msgs, () => {
      if (step.company) {
        setTimeout(() => {
          addCompanyCard(step.company);
          pathStep++;
          setTimeout(() => runPathStep(), 600);
        }, 300);
      } else if (step.companyDetail) {
        setTimeout(() => {
          addCompanyDetailCard(step.companyDetail);
          if (step.chips && step.chips.length) showChips(step.chips);
        }, 300);
      } else if (step.chips && step.chips.length) {
        showChips(step.chips);
      } else {
        pathStep++;
        setTimeout(() => runPathStep(), 300);
      }

      // Show reminder every 5 messages
      if (msgCount > 0 && msgCount % 8 === 0) {
        setTimeout(() => {
          const reminder = document.createElement('div');
          reminder.className = 'reminder';
          reminder.textContent = '💡 わからない言葉があったら聞いてね！';
          chatArea.appendChild(reminder);
          scrollBottom();
        }, 500);
      }
    });
    return;
  }

  // Choice-based step
  let responseData = null;
  if (userChoice && step[userChoice]) {
    responseData = step[userChoice];
  } else if (step._default) {
    responseData = step._default;
  } else {
    const keys = Object.keys(step).filter(k => k !== '_default' && k !== 'ai' && k !== 'chips' && k !== 'company' && k !== 'companyDetail');
    if (keys.length > 0 && step[keys[0]]) {
      responseData = step[keys[0]];
    }
  }

  if (!responseData) {
    currentPath = null;
    pathStep = 0;
    showChips(initialChips);
    return;
  }

  addTypingThenMessages(responseData.ai || [], () => {
    if (responseData.company) {
      setTimeout(() => addCompanyCard(responseData.company), 300);
    }
    if (responseData.companyDetail) {
      setTimeout(() => addCompanyDetailCard(responseData.companyDetail), 300);
    }
    if (responseData.chips && responseData.chips.length) {
      setTimeout(() => showChips(responseData.chips), responseData.company || responseData.companyDetail ? 600 : 0);
    } else {
      currentPath = null;
      pathStep = 0;
      setTimeout(() => showChips(initialChips), 500);
    }
  });
}

function scrollBottom() {
  requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; });
}

function timeNow() {
  const n = new Date();
  return n.getHours().toString().padStart(2, '0') + ':' + n.getMinutes().toString().padStart(2, '0');
}

function esc(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}
</script>
