<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>あるある行動診断</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideInRight { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
@keyframes slideOutLeft { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(-60px); } }
@keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
@keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(127,119,221,0.4); } 50% { box-shadow: 0 0 0 12px rgba(127,119,221,0); } }
@keyframes confetti { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-200px) rotate(720deg); opacity: 0; } }
@keyframes ringPulse { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 283; } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes scaleUp { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes drawLine { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: #EEEDFE;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  color: #333;
  -webkit-tap-highlight-color: transparent;
}

.app-container {
  max-width: 375px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  overflow: hidden;
}

/* Start Screen */
.start-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: 100dvh;
  padding: 24px;
  text-align: center;
  animation: fadeIn 0.6s ease;
}
.start-emoji {
  font-size: 72px;
  margin-bottom: 16px;
  animation: float 2s ease-in-out infinite;
}
.start-title {
  font-size: 28px;
  font-weight: 800;
  color: #7F77DD;
  margin-bottom: 8px;
  line-height: 1.3;
}
.start-subtitle {
  font-size: 15px;
  color: #888;
  margin-bottom: 32px;
  line-height: 1.6;
}
.start-btn {
  background: linear-gradient(135deg, #7F77DD, #9B8FFF);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 16px 48px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  animation: pulse 2s infinite;
  transition: transform 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.start-btn:active { transform: scale(0.95); }
.start-info {
  margin-top: 20px;
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: #999;
}
.start-info span { display: flex; align-items: center; gap: 4px; }

/* Quiz Screen */
.quiz-screen {
  display: none;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
  padding: 16px;
}

/* Header */
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding: 0 4px;
}
.progress-dots {
  display: flex;
  gap: 6px;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #D8D5F0;
  transition: all 0.3s ease;
}
.dot.active { background: #7F77DD; transform: scale(1.2); }
.dot.done { background: #7F77DD; }
.question-count {
  font-size: 14px;
  font-weight: 700;
  color: #7F77DD;
}

/* Timer */
.timer-container {
  display: flex;
  justify-content: center;
  margin-bottom: 16px;
  position: relative;
}
.timer-ring {
  width: 64px;
  height: 64px;
  transform: rotate(-90deg);
}
.timer-bg {
  fill: none;
  stroke: #E8E6F8;
  stroke-width: 5;
}
.timer-progress {
  fill: none;
  stroke: #7F77DD;
  stroke-width: 5;
  stroke-linecap: round;
  stroke-dasharray: 163;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear, stroke 0.3s;
}
.timer-progress.warning { stroke: #FF6B6B; }
.timer-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px;
  font-weight: 800;
  color: #7F77DD;
  transition: color 0.3s;
}
.timer-text.warning { color: #FF6B6B; }

/* Question Card */
.question-card {
  background: #fff;
  border-radius: 24px;
  padding: 28px 22px;
  box-shadow: 0 8px 32px rgba(127,119,221,0.12);
  flex: 1;
  display: flex;
  flex-direction: column;
  animation: slideInRight 0.4s ease;
}
.question-card.exit { animation: slideOutLeft 0.3s ease forwards; }
.question-emoji {
  font-size: 40px;
  margin-bottom: 12px;
  text-align: center;
}
.question-label {
  font-size: 12px;
  color: #7F77DD;
  font-weight: 700;
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: 1px;
}
.question-text {
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 24px;
  line-height: 1.5;
  color: #333;
}

/* Choices */
.choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}
.choice-btn {
  background: #F8F7FF;
  border: 2px solid #E8E6F8;
  border-radius: 16px;
  padding: 16px 18px;
  font-size: 16px;
  font-weight: 600;
  color: #555;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
  -webkit-tap-highlight-color: transparent;
}
.choice-btn .choice-icon {
  font-size: 20px;
  flex-shrink: 0;
}
.choice-btn:active { transform: scale(0.97); }
.choice-btn.selected {
  background: #7F77DD;
  border-color: #7F77DD;
  color: #fff;
  animation: bounce 0.3s ease;
}

/* Feedback Card (every 5 questions) */
.feedback-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.feedback-overlay.show { display: flex; }
.feedback-card {
  background: #fff;
  border-radius: 24px;
  padding: 32px 24px;
  text-align: center;
  max-width: 340px;
  width: 100%;
  animation: popIn 0.4s ease;
  box-shadow: 0 16px 48px rgba(0,0,0,0.15);
}
.feedback-emoji { font-size: 56px; margin-bottom: 12px; }
.feedback-title {
  font-size: 18px;
  font-weight: 800;
  color: #7F77DD;
  margin-bottom: 8px;
}
.feedback-text {
  font-size: 15px;
  color: #666;
  line-height: 1.6;
  margin-bottom: 20px;
}
.feedback-btn {
  background: linear-gradient(135deg, #7F77DD, #9B8FFF);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 14px 36px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}

/* Results Screen */
.results-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 24px 20px 40px;
  min-height: 100vh;
  animation: fadeIn 0.6s ease;
}
.results-header {
  text-align: center;
  margin-bottom: 24px;
}
.results-emoji { font-size: 64px; margin-bottom: 8px; }
.results-title {
  font-size: 24px;
  font-weight: 800;
  color: #7F77DD;
}
.results-subtitle {
  font-size: 14px;
  color: #888;
  margin-top: 4px;
}

/* Radar Chart */
.radar-container {
  background: #fff;
  border-radius: 24px;
  padding: 24px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(127,119,221,0.1);
  margin-bottom: 20px;
  animation: popIn 0.5s ease 0.2s both;
}
.radar-title {
  font-size: 16px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 16px;
  color: #7F77DD;
}
.radar-svg {
  width: 100%;
  max-width: 280px;
  margin: 0 auto;
  display: block;
}

/* Keywords */
.keywords-container {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 20px;
  animation: popIn 0.5s ease 0.4s both;
}
.keyword-tag {
  background: linear-gradient(135deg, #7F77DD, #9B8FFF);
  color: #fff;
  border-radius: 50px;
  padding: 10px 20px;
  font-size: 15px;
  font-weight: 700;
}

/* Description */
.description-card {
  background: #fff;
  border-radius: 24px;
  padding: 24px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(127,119,221,0.1);
  margin-bottom: 20px;
  animation: popIn 0.5s ease 0.6s both;
}
.description-title {
  font-size: 16px;
  font-weight: 700;
  color: #7F77DD;
  margin-bottom: 12px;
  text-align: center;
}
.description-text {
  font-size: 15px;
  color: #555;
  line-height: 1.8;
}

/* Retry button */
.retry-btn {
  background: #fff;
  color: #7F77DD;
  border: 2px solid #7F77DD;
  border-radius: 50px;
  padding: 14px 40px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  animation: popIn 0.5s ease 0.8s both;
}
</style>
</head>
<body>

<div class="app-container">
  <!-- Start Screen -->
  <div class="start-screen" id="startScreen">
    <div class="start-emoji">🎭</div>
    <div class="start-title">あるある行動診断</div>

    <button class="start-btn" onclick="startQuiz()">スタート！</button>

</div>

<script>

    choices: [
      { icon: '✋', text: '自分から提案する', scores: { leadership: 3, social: 2, planning: 2, curiosity: 1, sensitivity: 0 } },
      { icon: '🤷', text: '誰かに任せる', scores: { leadership: 0, social: 1, planning: 0, curiosity: 0, sensitivity: 2 } },
      { icon: '👂', text: 'みんなの意見聞く', scores: { leadership: 1, social: 2, planning: 1, curiosity: 1, sensitivity: 3 } },
      { icon: '⏰', text: '直前まで決めない', scores: { leadership: 0, social: 1, planning: 0, curiosity: 2, sensitivity: 1 } }
    ]
  },
  {
    emoji: '📝',
    label: 'Q4 / 勉強スタイル',
    text: 'テスト前日の過ごし方',
    choices: [
      { icon: '🌙', text: '徹夜で詰め込む', scores: { leadership: 1, social: 0, planning: 0, curiosity: 1, sensitivity: 2 } },
      { icon: '📊', text: '計画通りに進める', scores: { leadership: 1, social: 0, planning: 3, curiosity: 1, sensitivity: 0 } },
      { icon: '👫', text: '友達と勉強会', scores: { leadership: 1, social: 3, planning: 1, curiosity: 1, sensitivity: 1 } },

  {

    label: 'Q5 / デジタル',
    text: 'SNSで一番見るもの',

      { icon: '🌟', text: '推し活コンテンツ', scores: { leadership: 0, social: 1, planning: 1, curiosity: 1, sensitivity: 3 } },

    choices: [
      { icon: '🎉', text: '友達とお出かけ', scores: { leadership: 1, social: 3, planning: 1, curiosity: 1, sensitivity: 1 } },
      { icon: '🛋', text: '家でゴロゴロ', scores: { leadership: 0, social: 0, planning: 0, curiosity: 0, sensitivity: 3 } },

  {

  {

    label: 'Q8 / 将来',
    text: '将来について考える頻度',
    choices: [
      { icon: '📆', text: '毎日考える', scores: { leadership: 2, social: 0, planning: 3, curiosity: 2, sensitivity: 1 } },
      { icon: '🤔', text: 'たまに考える', scores: { leadership: 1, social: 1, planning: 2, curiosity: 1, sensitivity: 1 } },
      { icon: '💁', text: '聞かれた時だけ', scores: { leadership: 0, social: 1, planning: 0, curiosity: 0, sensitivity: 2 } },
      { icon: '🙈', text: '考えたくない', scores: { leadership: 0, social: 0, planning: 0, curiosity: 0, sensitivity: 3 } }
    ]
  },
  {
    emoji: '🏫',
    label: 'Q9 / 適応力',
    text: '新しいクラスの初日',
    choices: [
      { icon: '👋', text: 'すぐ話しかける', scores: { leadership: 3, social: 3, planning: 0, curiosity: 2, sensitivity: 0 } },
      { icon: '👁', text: '様子を見る', scores: { leadership: 0, social: 0, planning: 3, curiosity: 1, sensitivity: 2 } },
      { icon: '🤝', text: '隣の人と話す', scores: { leadership: 1, social: 2, planning: 1, curiosity: 1, sensitivity: 1 } },
      { icon: '😌', text: '一人でも平気', scores: { leadership: 1, social: 0, planning: 1, curiosity: 1, sensitivity: 2 } }
    ]
  },
  {
    emoji: '👨‍🏫',
    label: 'Q10 / 価値観',
    text: '好きな先生の特徴',
    choices: [
      { icon: '🤣', text: '面白い', scores: { leadership: 0, social: 2, planning: 0, curiosity: 2, sensitivity: 2 } },
      { icon: '🥰', text: '優しい', scores: { leadership: 0, social: 1, planning: 0, curiosity: 0, sensitivity: 3 } },
      { icon: '⚖', text: '厳しいけど公平', scores: { leadership: 2, social: 0, planning: 3, curiosity: 1, sensitivity: 0 } },
      { icon: '👂', text: '話を聞いてくれる', scores: { leadership: 1, social: 2, planning: 1, curiosity: 1, sensitivity: 2 } }
    ]
  }
];

const axisLabels = ['社交性', '計画性', '好奇心', 'リーダーシップ', '感受性'];
const axisKeys = ['social', 'planning', 'curiosity', 'leadership', 'sensitivity'];

let currentQ = 0;
let answers = [];
let timerInterval = null;
let timeLeft = 10;
let scores = { social: 0, planning: 0, curiosity: 0, leadership: 0, sensitivity: 0 };

function startQuiz() {
  document.getElementById('startScreen').style.display = 'none';
  const qs = document.getElementById('quizScreen');
  qs.style.display = 'flex';
  buildDots();
  showQuestion();
}

function buildDots() {
  const dots = document.getElementById('progressDots');
  dots.innerHTML = '';
  for (let i = 0; i < questions.length; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = 'dot' + i;
    dots.appendChild(d);
  }
}

function showQuestion() {
  clearInterval(timerInterval);
  timeLeft = 10;
  const q = questions[currentQ];
  document.getElementById('questionCount').textContent = `${currentQ + 1}/10`;
  document.getElementById('questionEmoji').textContent = q.emoji;
  document.getElementById('questionLabel').textContent = q.label;
  document.getElementById('questionText').textContent = q.text;

  const card = document.getElementById('questionCard');
  card.classList.remove('exit');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideInRight 0.4s ease';

  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-icon">${c.icon}</span>${c.text}`;
    btn.style.animationDelay = `${i * 0.08}s`;
    btn.onclick = () => selectChoice(i);
    choicesDiv.appendChild(btn);
  });

  updateDots();
  startTimer();
}

function startTimer() {
  const progress = document.getElementById('timerProgress');
  const text = document.getElementById('timerText');
  const circumference = 2 * Math.PI * 26;
  timeLeft = 10;
  text.textContent = '10';
  text.classList.remove('warning');
  progress.classList.remove('warning');
  progress.style.strokeDashoffset = '0';

  timerInterval = setInterval(() => {
    timeLeft--;
    text.textContent = timeLeft;
    const offset = circumference * (1 - timeLeft / 10);
    progress.style.strokeDashoffset = offset;

    if (timeLeft <= 3) {
      text.classList.add('warning');
      progress.classList.add('warning');
    }

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      selectChoice(Math.floor(Math.random() * 4));
    }
  }, 1000);
}

function selectChoice(idx) {
  clearInterval(timerInterval);
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((b, i) => {
    if (i === idx) b.classList.add('selected');
    b.style.pointerEvents = 'none';
  });

  const q = questions[currentQ];
  const chosen = q.choices[idx];
  answers.push(idx);

  Object.keys(chosen.scores).forEach(k => {
    scores[k] += chosen.scores[k];
  });

  setTimeout(() => {
    const card = document.getElementById('questionCard');
    card.classList.add('exit');

    setTimeout(() => {
      currentQ++;

      if (currentQ === 5) {
        showFeedback();
        return;
      }

      if (currentQ >= questions.length) {
        showResults();
        return;
      }

      showQuestion();
    }, 300);
  }, 500);
}

function updateDots() {
  for (let i = 0; i < questions.length; i++) {
    const d = document.getElementById('dot' + i);
    d.className = 'dot';
    if (i < currentQ) d.classList.add('done');
    if (i === currentQ) d.classList.add('active');
  }
}

function showFeedback() {
  const overlay = document.getElementById('feedbackOverlay');
  const maxKey = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
  const feedbackMap = {
    social: { emoji: '🎉', title: 'ここまでの傾向', text: '社交的なムードメーカータイプかも？\n周りの人を大事にする気持ちが伝わってくるよ！' },
    planning: { emoji: '📐', title: 'ここまでの傾向', text: 'しっかり者の計画タイプかも？\nコツコツ進める力がありそう！' },
    curiosity: { emoji: '🔍', title: 'ここまでの傾向', text: '好奇心旺盛な探究タイプかも？\n新しいことにワクワクできるのは素敵！' },
    leadership: { emoji: '👑', title: 'ここまでの傾向', text: 'リーダータイプの可能性大！\nみんなを引っ張る力がありそう！' },
    sensitivity: { emoji: '💝', title: 'ここまでの傾向', text: '感受性豊かなタイプかも？\n繊細な気づきは大きな武器だよ！' }
  };
  const fb = feedbackMap[maxKey];

}

function closeFeedback() {
  document.getElementById('feedbackOverlay').classList.remove('show');
  showQuestion();
}

function showResults() {
  document.getElementById('quizScreen').style.display = 'none';
  const rs = document.getElementById('resultsScreen');
  rs.style.display = 'flex';

  const maxScore = Math.max(...axisKeys.map(k => scores[k]));
  const normalizedScores = axisKeys.map(k => Math.max(0.15, scores[k] / Math.max(maxScore, 1)));

  drawRadarChart(normalizedScores);
  showKeywords();
  showDescription();
}

function drawRadarChart(values) {
  const svg = document.getElementById('radarChart');
  const cx = 150, cy = 135, r = 100;
  const angleStep = (2 * Math.PI) / 5;
  const startAngle = -Math.PI / 2;

  let html = '';

  // Grid
  for (let level = 1; level <= 4; level++) {
    const lr = (r * level) / 4;
    let pts = [];
    for (let i = 0; i < 5; i++) {
      const angle = startAngle + i * angleStep;
      pts.push(`${cx + lr * Math.cos(angle)},${cy + lr * Math.sin(angle)}`);
    }
    html += `<polygon points="${pts.join(' ')}" fill="none" stroke="#E8E6F8" stroke-width="1"/>`;
  }

  // Axes
  for (let i = 0; i < 5; i++) {
    const angle = startAngle + i * angleStep;
    const x2 = cx + r * Math.cos(angle);
    const y2 = cy + r * Math.sin(angle);
    html += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#E8E6F8" stroke-width="1"/>`;
  }

  // Data polygon
  let dataPoints = [];
  for (let i = 0; i < 5; i++) {
    const angle = startAngle + i * angleStep;
    const v = values[i] * r;
    dataPoints.push(`${cx + v * Math.cos(angle)},${cy + v * Math.sin(angle)}`);
  }
  html += `<polygon points="${dataPoints.join(' ')}" fill="rgba(127,119,221,0.2)" stroke="#7F77DD" stroke-width="2.5" style="stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawLine 1.5s ease 0.5s forwards;"/>`;

  // Dots
  for (let i = 0; i < 5; i++) {
    const angle = startAngle + i * angleStep;
    const v = values[i] * r;
    const dx = cx + v * Math.cos(angle);
    const dy = cy + v * Math.sin(angle);
    html += `<circle cx="${dx}" cy="${dy}" r="5" fill="#7F77DD" style="animation: scaleUp 0.3s ease ${0.8 + i * 0.1}s both;"/>`;
  }

  // Labels
  const labelOffsets = [
    { dx: 0, dy: -14 },
    { dx: 14, dy: 4 },
    { dx: 10, dy: 14 },
    { dx: -10, dy: 14 },
    { dx: -14, dy: 4 }
  ];
  for (let i = 0; i < 5; i++) {
    const angle = startAngle + i * angleStep;
    const lx = cx + (r + 24) * Math.cos(angle) + labelOffsets[i].dx;
    const ly = cy + (r + 24) * Math.sin(angle) + labelOffsets[i].dy;
    html += `<text x="${lx}" y="${ly}" text-anchor="middle" font-size="13" font-weight="700" fill="#7F77DD">${axisLabels[i]}</text>`;
  }

  svg.innerHTML = html;
}

function showKeywords() {
  const sorted = axisKeys.map((k, i) => ({ key: k, label: axisLabels[i], score: scores[k] })).sort((a, b) => b.score - a.score);
  const keywordMap = {
    social: ['仲間思い', 'ムードメーカー', '社交的'],
    planning: ['コツコツ派', '計画的', '堅実'],
    curiosity: ['探究心', 'アイデアマン', '冒険好き'],
    leadership: ['統率力', '決断力', 'まとめ役'],
    sensitivity: ['感受性豊か', '繊細', '共感力']
  };

  const container = document.getElementById('keywords');
  container.innerHTML = '';
  const topKeys = sorted.slice(0, 3);
  topKeys.forEach((s, i) => {
    const kws = keywordMap[s.key];
    const tag = document.createElement('div');
    tag.className = 'keyword-tag';
    tag.textContent = `#${kws[i % kws.length]}`;
    container.appendChild(tag);
  });
}
